<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <!-- favicon.io generated icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "/icon/apple-touch-icon.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "/icon/favicon-32x32.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "/icon/favicon-16x16.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ "/icon/android-chrome-192x192.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ "/icon/android-chrome-512x512.png" | relative_url }}">
  <link rel="icon" href="{{ "/icon/favicon.ico" | relative_url }}">
  <link rel="manifest" href="{{ "/icon/site.webmanifest" | relative_url }}">
  <meta name="theme-color" content="#ffffff">

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
</head>
